<script>
const DEFAULT_TICKERS = ["PETR4","VALE3","B3SA3","ITUB4","BBAS3"];
const STORAGE_KEY = "stockdesk_v9";
const BRAPI = "https://brapi.dev/api";
let state = load() || {tickers:[...DEFAULT_TICKERS], token:"", selected:"PETR4"};
let data = {}; // ticker -> {quote, bars}
let timer = null;
let activeTab = "overview";

const WEEKDAYS = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
const MONTHS = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}catch(e){}}
function load(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))}catch(e){return null}}
const fmt=(n,d=2)=>n==null||isNaN(n)?"—":Number(n).toLocaleString("pt-BR",{minimumFractionDigits:d,maximumFractionDigits:d});
const pct=(n,d=2)=>n==null||isNaN(n)?"—":(n>=0?"+":"")+Number(n).toFixed(d)+"%";
const cls=n=>n==null?"":(n>=0?"up":"down");
const chipCls=n=>n==null?"chip":(n>=0?"chip up":"chip dn");

async function fetchQuote(t){
  const tk=(document.getElementById("brapiToken").value||state.token||"").trim();
  const url=`${BRAPI}/quote/${t}?range=2y&interval=1d${tk?`&token=${tk}`:""}`;
  const r=await fetch(url); if(!r.ok) throw new Error("HTTP "+r.status);
  const j=await r.json(); if(j.error) throw new Error(j.message||"api");
  return j.results?.[0];
}

// ============ STATS ============
function sma(a,n){if(a.length<n) return null; return a.slice(-n).reduce((x,y)=>x+y,0)/n}
function rsi(c,n=14){
  if(c.length<n+1) return null;
  let g=0,l=0;
  for(let i=c.length-n;i<c.length;i++){const d=c[i]-c[i-1]; if(d>=0)g+=d; else l-=d}
  if(l===0) return 100;
  return 100-100/(1+(g/n)/(l/n));
}
function histVol(c,n=60){
  if(c.length<n+1) return null;
  const r=[];
  for(let i=c.length-n;i<c.length;i++) r.push(Math.log(c[i]/c[i-1]));
  const m=r.reduce((a,b)=>a+b,0)/r.length;
  const v=r.reduce((a,b)=>a+(b-m)*(b-m),0)/(r.length-1);
  return Math.sqrt(v*252);
}

// streak: consecutive up/down days counting from most recent
function currentStreak(bars){
  if(bars.length<2) return {dir:0,len:0};
  let dir=0,len=0;
  for(let i=bars.length-1;i>0;i--){
    const d = bars[i].close - bars[i-1].close;
    if(d===0) break;
    const s = d>0?1:-1;
    if(dir===0) dir=s;
    if(s!==dir) break;
    len++;
  }
  return {dir,len};
}

// distribution of streak lengths + next-day behavior
function streakStats(bars){
  const streaks=[]; // {dir,len,nextRet}
  let dir=0,len=0;
  for(let i=1;i<bars.length;i++){
    const d = bars[i].close - bars[i-1].close;
    const s = d>0?1:(d<0?-1:0);
    if(s===0) continue;
    if(s===dir){len++} else {
      if(dir!==0 && i<bars.length) streaks.push({dir,len,endIdx:i-1});
      dir=s; len=1;
    }
  }
  if(dir!==0) streaks.push({dir,len,endIdx:bars.length-1});
  // compute next-day return for each
  const withNext = streaks.filter(s=>s.endIdx+1<bars.length).map(s=>({
    ...s, nextRet: (bars[s.endIdx+1].close/bars[s.endIdx].close-1)*100
  }));
  // group by (dir,len) for lens 1..7
  const table=[];
  for(let l=1;l<=7;l++){
    for(const d of [1,-1]){
      const sub = withNext.filter(s=>s.dir===d && s.len===l);
      if(sub.length===0){table.push({dir:d,len:l,n:0,pUp:null,mean:null,cont:null});continue}
      const pUp = sub.filter(s=>s.nextRet>0).length/sub.length;
      const mean = sub.reduce((a,b)=>a+b.nextRet,0)/sub.length;
      // continuation: next day in same direction
      const cont = sub.filter(s=>s.dir===1?s.nextRet>0:s.nextRet<0).length/sub.length;
      table.push({dir:d,len:l,n:sub.length,pUp,mean,cont});
    }
  }
  return {all:withNext,table};
}

// new highs/lows count last N
function extremesCount(bars,n,lookback=252){
  let hi=0,lo=0;
  for(let i=Math.max(n,bars.length-lookback);i<bars.length;i++){
    const window = bars.slice(i-n+1,i+1).map(b=>b.close);
    if(bars[i].close === Math.max(...window)) hi++;
    if(bars[i].close === Math.min(...window)) lo++;
  }
  return {hi,lo};
}

function gapStats(bars){
  const out=[];
  for(let i=1;i<bars.length;i++){
    if(!bars[i].open||!bars[i-1].close) continue;
    const gap = (bars[i].open/bars[i-1].close-1)*100;
    const close = (bars[i].close/bars[i].open-1)*100;
    const dayRet = (bars[i].close/bars[i-1].close-1)*100;
    const filled = gap>0 ? bars[i].low<=bars[i-1].close : bars[i].high>=bars[i-1].close;
    out.push({gap,close,dayRet,filled,weekday:new Date(bars[i].date*1000).getDay()});
  }
  const buckets=[
    {label:"< -3%",min:-Infinity,max:-3},
    {label:"-3 a -2%",min:-3,max:-2},
    {label:"-2 a -1%",min:-2,max:-1},
    {label:"-1 a -0.3%",min:-1,max:-0.3},
    {label:"-0.3 a +0.3%",min:-0.3,max:0.3},
    {label:"+0.3 a +1%",min:0.3,max:1},
    {label:"+1 a +2%",min:1,max:2},
    {label:"+2 a +3%",min:2,max:3},
    {label:"> +3%",min:3,max:Infinity}
  ];
  const stats = buckets.map(b=>{
    const sub = out.filter(x=>x.gap>b.min && x.gap<=b.max);
    if(sub.length===0) return {...b,n:0};
    const pUp = sub.filter(x=>x.dayRet>0).length/sub.length;
    const mean = sub.reduce((a,c)=>a+c.dayRet,0)/sub.length;
    const fillRate = sub.filter(x=>x.filled).length/sub.length;
    return {...b,n:sub.length,pUp,mean,fillRate};
  });
  return {all:out,buckets:stats};
}

function weekdayStats(bars){
  const dr=[];
  for(let i=1;i<bars.length;i++){
    const ret=(bars[i].close/bars[i-1].close-1)*100;
    dr.push({wd:new Date(bars[i].date*1000).getDay(),ret});
  }
  const days=[1,2,3,4,5].map(w=>{
    const sub=dr.filter(x=>x.wd===w);
    if(sub.length===0) return {wd:w,n:0};
    const pUp=sub.filter(x=>x.ret>0).length/sub.length;
    const mean=sub.reduce((a,b)=>a+b.ret,0)/sub.length;
    return {wd:w,n:sub.length,pUp,mean};
  });
  return days;
}

function monthStats(bars){
  const dr=[];
  for(let i=1;i<bars.length;i++){
    const ret=(bars[i].close/bars[i-1].close-1)*100;
    dr.push({m:new Date(bars[i].date*1000).getMonth(),ret});
  }
  return Array.from({length:12},(_,m)=>{
    const sub=dr.filter(x=>x.m===m);
    if(sub.length===0) return {m,n:0};
    const pUp=sub.filter(x=>x.ret>0).length/sub.length;
    const mean=sub.reduce((a,b)=>a+b.ret,0)/sub.length;
    return {m,n:sub.length,pUp,mean};
  });
}

function levels(bars){
  const closes=bars.map(b=>b.close);
  const highs=bars.map(b=>b.high);
  const lows=bars.map(b=>b.low);
  const n = Math.min(252,bars.length);
  const last = closes[closes.length-1];
  const hi52=Math.max(...highs.slice(-n));
  const lo52=Math.min(...lows.slice(-n));
  const ath=Math.max(...highs);
  const atl=Math.min(...lows);
  // days since 52w high / low
  let dsh=0,dsl=0,dsath=0;
  for(let i=highs.length-1;i>=0 && highs.length-1-i<n;i--){if(highs[i]>=hi52*0.9999){dsh=highs.length-1-i;break}}
  for(let i=lows.length-1;i>=0 && lows.length-1-i<n;i--){if(lows[i]<=lo52*1.0001){dsl=lows.length-1-i;break}}
  for(let i=highs.length-1;i>=0;i--){if(highs[i]>=ath*0.9999){dsath=highs.length-1-i;break}}
  return {last,hi52,lo52,ath,atl,dsh,dsl,dsath,pctFromHi:(last/hi52-1)*100,pctFromLo:(last/lo52-1)*100,pctFromAth:(last/ath-1)*100};
}

// max drawdown over last N
function drawdown(bars,n=252){
  const slice=bars.slice(-n).map(b=>b.close);
  let peak=slice[0],maxDD=0,curDD=0;
  for(const c of slice){if(c>peak) peak=c; const dd=(c/peak-1)*100; if(dd<maxDD) maxDD=dd;}
  const last=slice[slice.length-1];
  curDD=(last/peak-1)*100;
  return {maxDD,curDD};
}

// reversals: after N consecutive down, P(up next)
// already in streakStats

// fibonacci retracement from recent swing (last 60d)
function fibLevels(bars,n=60){
  const slice=bars.slice(-n);
  const hi=Math.max(...slice.map(b=>b.high));
  const lo=Math.min(...slice.map(b=>b.low));
  return {
    high:hi,low:lo,
    l236:hi-(hi-lo)*0.236,
    l382:hi-(hi-lo)*0.382,
    l500:hi-(hi-lo)*0.5,
    l618:hi-(hi-lo)*0.618,
    l786:hi-(hi-lo)*0.786
  };
}

// ============ RENDER ============
function renderTickerList(){
  const list=document.getElementById("tickerList");
  list.innerHTML = state.tickers.map(t=>{
    const d=data[t];
    const chgP = d?.quote?.regularMarketChangePercent;
    const last = d?.quote?.regularMarketPrice;
    return `
      <div class="tick-btn ${t===state.selected?"active":""}" data-t="${t}">
        <div class="flex justify-between items-center">
          <div>
            <div class="font-semibold text-sm">${t}</div>
            <div class="text-xs dim num">R$ ${fmt(last)}</div>
          </div>
          <div class="text-right">
            <span class="${chipCls(chgP)}">${pct(chgP)}</span>
            <button class="block text-xs dim mt-1 rm hover:text-red-400" data-t="${t}">remover</button>
          </div>
        </div>
      </div>`;
  }).join("");
  list.querySelectorAll(".tick-btn").forEach(el=>{
    el.onclick = e=>{
      if(e.target.classList.contains("rm")) return;
      state.selected = el.dataset.t; save(); renderTickerList(); renderMain();
    };
  });
  list.querySelectorAll(".rm").forEach(b=>b.onclick=e=>{
    e.stopPropagation();
    state.tickers = state.tickers.filter(x=>x!==b.dataset.t);
    if(state.selected===b.dataset.t) state.selected=state.tickers[0];
    save(); refreshAll();
  });
}

function renderHeader(t){
  const d=data[t]; if(!d||!d.quote) return;
  const q=d.quote;
  const chgP=q.regularMarketChangePercent, chg=q.regularMarketChange;
  document.getElementById("selLabel").textContent = q.longName || q.shortName || "Ticker";
  document.getElementById("selTicker").textContent = t;
  document.getElementById("selPrice").textContent = "R$ "+fmt(q.regularMarketPrice);
  const chip=document.getElementById("selChg"); chip.className=chipCls(chgP); chip.textContent=pct(chgP);
  const abs=document.getElementById("selChgAbs"); abs.className="text-sm num "+cls(chg); abs.textContent=(chg>=0?"+":"")+"R$ "+fmt(chg);
  document.getElementById("selSub").textContent = `Abr ${fmt(q.regularMarketOpen)} · Mín ${fmt(q.regularMarketDayLow)} · Máx ${fmt(q.regularMarketDayHigh)} · Fech.Ant ${fmt(q.regularMarketPreviousClose)} · Vol ${q.regularMarketVolume?Number(q.regularMarketVolume).toLocaleString("pt-BR"):"—"}`;
  const bars=d.bars;
  const closes=bars.map(b=>b.close);
  const s20=sma(closes,20),s50=sma(closes,50);
  const sess=document.getElementById("selSession");
  sess.className="chip"; sess.textContent = q.regularMarketPrice > q.regularMarketPreviousClose ? "↑ sessão alta" : "↓ sessão baixa";
  sess.className = "chip "+(q.regularMarketPrice > q.regularMarketPreviousClose ? "up":"dn");
  const tr=document.getElementById("selTrend");
  tr.className = "chip "+(s20>s50?"up":"dn");
  tr.textContent = s20>s50 ? "Tendência alta" : "Tendência baixa";
}

function renderKPIs(t){
  const d=data[t]; if(!d||!d.bars.length) return;
  const bars=d.bars; const closes=bars.map(b=>b.close);
  const streak=currentStreak(bars);
  const lvl=levels(bars);
  const dd=drawdown(bars,252);
  const ext5=extremesCount(bars,5,60);
  const ext22=extremesCount(bars,22,252);
  const r14=rsi(closes,14);
  const hv=histVol(closes,60);
  const prev=bars[bars.length-2];
  const cur=bars[bars.length-1];
  const gap = prev&&cur.open?((cur.open/prev.close-1)*100):null;

  const kpis=[
    {label:"Sequência atual",value:`${streak.dir>0?"↑":"↓"} ${streak.len}`,sub:`${streak.dir>0?"dias de alta":"dias de baixa"}`,cl:streak.dir>0?"up":"down"},
    {label:"RSI14",value:r14?r14.toFixed(1):"—",sub:r14>70?"sobrecompra":r14<30?"sobrevenda":"neutro",cl:r14>70?"down":r14<30?"up":""},
    {label:"Vol 60d anual.",value:hv?(hv*100).toFixed(1)+"%":"—",sub:`1σ dia ±${hv?(hv/Math.sqrt(252)*100).toFixed(2):"—"}%`},
    {label:"Dist. máx 52s",value:pct(lvl.pctFromHi,2),sub:`${lvl.dsh}d atrás · ${fmt(lvl.hi52)}`,cl:cls(lvl.pctFromHi)},
    {label:"Dist. mín 52s",value:pct(lvl.pctFromLo,2),sub:`${lvl.dsl}d atrás · ${fmt(lvl.lo52)}`,cl:cls(lvl.pctFromLo)},
    {label:"Drawdown atual",value:pct(dd.curDD,2),sub:`máx ${pct(dd.maxDD,2)}`,cl:"down"},
    {label:"Gap hoje",value:gap!=null?pct(gap):"—",sub:"vs fech. anterior",cl:cls(gap)},
    {label:"Novos máx 5d (60d)",value:ext5.hi,sub:`mín: ${ext5.lo}`},
    {label:"Novos máx 22d (252d)",value:ext22.hi,sub:`mín: ${ext22.lo}`},
    {label:"Dist. topo histórico",value:pct(lvl.pctFromAth,2),sub:`${lvl.dsath}d atrás · ${fmt(lvl.ath)}`,cl:cls(lvl.pctFromAth)},
    {label:"SMA20 / 50 / 200",value:fmt(sma(closes,20)),sub:`${fmt(sma(closes,50))} · ${fmt(sma(closes,200))}`},
    {label:"Preço vs SMA20",value:pct((cur.close/sma(closes,20)-1)*100,2),sub:"",cl:cls(cur.close-sma(closes,20))}
  ];
  document.getElementById("kpiGrid").innerHTML = kpis.map(k=>`
    <div class="metric">
      <div class="label">${k.label}</div>
      <div class="value ${k.cl||""}">${k.value}</div>
      <div class="sub">${k.sub}</div>
    </div>`).join("");
}

function tabs(){
  document.querySelectorAll(".tab").forEach(t=>{
    t.onclick=()=>{
      document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
      t.classList.add("active"); activeTab=t.dataset.tab; renderPanels();
    };
  });
}

function renderPanels(){
  const t=state.selected; const d=data[t];
  if(!d||!d.bars.length){document.getElementById("panels").innerHTML="<div class='card p-6 dim'>Carregando…</div>";return}
  if(activeTab==="overview") panelOverview(t);
  else if(activeTab==="streaks") panelStreaks(t);
  else if(activeTab==="gaps") panelGaps(t);
  else if(activeTab==="seasonality") panelSeasonality(t);
  else if(activeTab==="levels") panelLevels(t);
  else if(activeTab==="watch") panelWatch();
}

let chartInst=null;
function panelOverview(t){
  const bars=data[t].bars;
  document.getElementById("panels").innerHTML=`
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
      <div class="card p-4 lg:col-span-2">
        <div class="flex justify-between mb-2"><div class="font-semibold">Preço · 1 ano</div><div class="dim text-xs">fechamento diário</div></div>
        <canvas id="priceChart" height="100"></canvas>
      </div>
      <div class="card p-4">
        <div class="font-semibold mb-3">Últimos 20 pregões</div>
        <div id="last20"></div>
      </div>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mt-4">
      <div class="card p-4">
        <div class="font-semibold mb-3">Retorno por janela</div>
        <div id="returns"></div>
      </div>
      <div class="card p-4">
        <div class="font-semibold mb-3">Volatilidade realizada</div>
        <canvas id="volChart" height="120"></canvas>
      </div>
    </div>
  `;
  // price chart
  if(chartInst) chartInst.destroy();
  const slice = bars.slice(-252);
  chartInst = new Chart(document.getElementById("priceChart"),{
    type:"line",
    data:{labels:slice.map(b=>new Date(b.date*1000).toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"})),
      datasets:[{data:slice.map(b=>b.close),borderColor:"#10b981",backgroundColor:"rgba(16,185,129,.1)",fill:true,tension:.25,pointRadius:0,borderWidth:2}]},
    options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#8b95a5",maxTicksLimit:8,font:{size:10}},grid:{color:"#1c2431"}},y:{ticks:{color:"#8b95a5"},grid:{color:"#1c2431"}}}}
  });
  // last 20
  const last20=bars.slice(-20).reverse().map(b=>{
    const prev=bars[bars.indexOf(b)-1];
    const ret = prev?((b.close/prev.close-1)*100):0;
    return `<div class="flex justify-between py-1.5 border-b border-ink-700">
      <span class="dim text-xs">${new Date(b.date*1000).toLocaleDateString("pt-BR")} ${WEEKDAYS[new Date(b.date*1000).getDay()]}</span>
      <span class="num ${cls(ret)}">${pct(ret)}</span>
      <span class="num text-xs dim">R$ ${fmt(b.close)}</span>
    </div>`;
  }).join("");
  document.getElementById("last20").innerHTML=last20;
  // returns
  const closes=bars.map(b=>b.close);
  const last=closes[closes.length-1];
  const windows=[1,5,22,63,126,252].map(n=>{
    if(closes.length<n+1) return {n,ret:null};
    return {n,ret:(last/closes[closes.length-1-n]-1)*100};
  });
  document.getElementById("returns").innerHTML = windows.map(w=>{
    const lbl={1:"1 dia",5:"1 semana",22:"1 mês",63:"3 meses",126:"6 meses",252:"12 meses"}[w.n];
    const barW = w.ret==null?0:Math.min(100,Math.abs(w.ret)*2);
    return `<div class="flex items-center gap-3 py-2">
      <div class="w-24 dim text-xs">${lbl}</div>
      <div class="flex-1 bar"><div style="width:${barW}%;background:${w.ret>=0?"#10b981":"#ef4444"}"></div></div>
      <div class="w-20 text-right num ${cls(w.ret)}">${pct(w.ret)}</div>
    </div>`;
  }).join("");
  // vol chart: rolling 22d realized
  const volSeries=[]; const labels=[];
  for(let i=22;i<closes.length;i++){
    const w=closes.slice(i-22,i+1);
    const rets=[]; for(let j=1;j<w.length;j++) rets.push(Math.log(w[j]/w[j-1]));
    const m=rets.reduce((a,b)=>a+b,0)/rets.length;
    const v=rets.reduce((a,b)=>a+(b-m)*(b-m),0)/(rets.length-1);
    volSeries.push(Math.sqrt(v*252)*100);
    labels.push(new Date(bars[i].date*1000).toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"}));
  }
  new Chart(document.getElementById("volChart"),{
    type:"line",
    data:{labels:labels.slice(-200),datasets:[{data:volSeries.slice(-200),borderColor:"#f59e0b",backgroundColor:"rgba(245,158,11,.1)",fill:true,tension:.2,pointRadius:0}]},
    options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#8b95a5",maxTicksLimit:6,font:{size:10}},grid:{color:"#1c2431"}},y:{ticks:{color:"#8b95a5",callback:v=>v+"%"},grid:{color:"#1c2431"}}}}
  });
}

function panelStreaks(t){
  const bars=data[t].bars;
  const cur=currentStreak(bars);
  const st=streakStats(bars);
  // visual of last 30 days
  const last30 = bars.slice(-30);
  const boxes = last30.map((b,i)=>{
    if(i===0) return "";
    const prev = last30[i-1];
    const d = b.close-prev.close;
    const c = d>0?"streak-up":d<0?"streak-dn":"streak-flat";
    return `<span class="streak-box ${c}" title="${new Date(b.date*1000).toLocaleDateString("pt-BR")} ${pct((b.close/prev.close-1)*100)}"></span>`;
  }).join("");
  const ups = st.table.filter(r=>r.dir===1);
  const downs = st.table.filter(r=>r.dir===-1);
  const tblRow = r => `<tr>
    <td>${r.len}</td>
    <td class="num">${r.n}</td>
    <td class="num ${cls(r.mean)}">${r.mean!=null?pct(r.mean):"—"}</td>
    <td class="num">${r.pUp!=null?(r.pUp*100).toFixed(0)+"%":"—"}</td>
    <td class="num">${r.cont!=null?(r.cont*100).toFixed(0)+"%":"—"}</td>
    <td><div class="bar"><div style="width:${r.pUp!=null?(r.pUp*100):0}%"></div></div></td>
  </tr>`;
  document.getElementById("panels").innerHTML=`
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
      <div class="card p-4 lg:col-span-1">
        <div class="font-semibold mb-2">Sequência atual</div>
        <div class="text-5xl font-bold ${cur.dir>0?"up":"down"}">${cur.dir>0?"↑":"↓"} ${cur.len}</div>
        <div class="dim mt-1 text-sm">${cur.dir>0?"dias consecutivos de alta":"dias consecutivos de baixa"}</div>
        <div class="mt-4">
          <div class="text-xs dim mb-2">Últimos 30 pregões</div>
          <div>${boxes}</div>
        </div>
      </div>
      <div class="card p-4 lg:col-span-2">
        <div class="font-semibold mb-3">Estatística de sequências — após N dias consecutivos de ALTA</div>
        <div class="overflow-auto">
        <table class="w-full">
          <thead><tr><th>N dias ↑</th><th>Amostras</th><th>Retorno médio D+1</th><th>P(↑ D+1)</th><th>P(continua)</th><th>Reversão</th></tr></thead>
          <tbody>${ups.map(tblRow).join("")}</tbody>
        </table>
        </div>
        <div class="font-semibold mb-3 mt-6">Após N dias consecutivos de BAIXA</div>
        <div class="overflow-auto">
        <table class="w-full">
          <thead><tr><th>N dias ↓</th><th>Amostras</th><th>Retorno médio D+1</th><th>P(↑ D+1)</th><th>P(continua)</th><th>Reversão</th></tr></thead>
          <tbody>${downs.map(tblRow).join("")}</tbody>
        </table>
        </div>
      </div>
    </div>
    <div class="card p-4 mt-4">
      <div class="font-semibold mb-2">Leitura</div>
      <div class="dim text-sm">Base histórica ~2 anos. "P(continua)" = probabilidade de o dia seguinte manter a direção da sequência. Valores baixos depois de sequências longas indicam viés de reversão à média — oportunidade de trade contrário.</div>
    </div>
  `;
}

function panelGaps(t){
  const bars=data[t].bars;
  const g=gapStats(bars);
  const rows = g.buckets.map(b=>`<tr>
    <td>${b.label}</td>
    <td class="num">${b.n}</td>
    <td class="num ${cls(b.mean)}">${b.mean!=null?pct(b.mean):"—"}</td>
    <td class="num">${b.pUp!=null?(b.pUp*100).toFixed(0)+"%":"—"}</td>
    <td class="num">${b.fillRate!=null?(b.fillRate*100).toFixed(0)+"%":"—"}</td>
    <td><div class="bar"><div style="width:${b.pUp!=null?(b.pUp*100):0}%"></div></div></td>
  </tr>`).join("");
  document.getElementById("panels").innerHTML=`
    <div class="card p-4">
      <div class="font-semibold mb-3">Probabilidade de alta no dia por bucket de gap de abertura</div>
      <div class="overflow-auto">
      <table class="w-full">
        <thead><tr><th>Bucket gap</th><th>Amostras</th><th>Retorno médio dia</th><th>P(↑ no dia)</th><th>Gap fill</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      </div>
    </div>
    <div class="card p-4 mt-4">
      <div class="font-semibold mb-2">Como usar</div>
      <div class="dim text-sm">"Gap fill" = probabilidade de o preço tocar o fechamento anterior durante o dia. Gaps grandes (+3% / -3%) costumam reverter mais — alvo de day trade contrário. Buckets com amostras baixas (&lt;20) não são estatisticamente robustos.</div>
    </div>
  `;
}

function panelSeasonality(t){
  const bars=data[t].bars;
  const wd=weekdayStats(bars);
  const mo=monthStats(bars);
  const maxAbs=Math.max(...wd.map(w=>Math.abs(w.mean||0)),...mo.map(m=>Math.abs(m.mean||0)));
  const heatColor=(v)=>{
    if(v==null) return "#1c2431";
    const intensity = Math.min(1, Math.abs(v)/maxAbs);
    return v>=0 ? `rgba(16,185,129,${0.15+intensity*0.6})` : `rgba(239,68,68,${0.15+intensity*0.6})`;
  };
  document.getElementById("panels").innerHTML=`
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
      <div class="card p-4">
        <div class="font-semibold mb-3">Desempenho por dia da semana</div>
        <div class="grid grid-cols-5 gap-2">
          ${wd.map(w=>`<div class="heatcell" style="background:${heatColor(w.mean)}">
            <div class="text-xs dim">${WEEKDAYS[w.wd]}</div>
            <div class="font-bold num">${w.mean!=null?pct(w.mean,2):"—"}</div>
            <div class="text-xs">P↑ ${w.pUp!=null?(w.pUp*100).toFixed(0)+"%":"—"}</div>
            <div class="text-xs dim">n=${w.n}</div>
          </div>`).join("")}
        </div>
      </div>
      <div class="card p-4">
        <div class="font-semibold mb-3">Desempenho por mês (média diária)</div>
        <div class="grid grid-cols-6 gap-2">
          ${mo.map(m=>`<div class="heatcell" style="background:${heatColor(m.mean)}">
            <div class="text-xs dim">${MONTHS[m.m]}</div>
            <div class="font-bold num">${m.mean!=null?pct(m.mean,2):"—"}</div>
            <div class="text-xs">P↑ ${m.pUp!=null?(m.pUp*100).toFixed(0)+"%":"—"}</div>
            <div class="text-xs dim">n=${m.n}</div>
          </div>`).join("")}
        </div>
      </div>
    </div>
    <div class="card p-4 mt-4">
      <div class="font-semibold mb-2">Leitura</div>
      <div class="dim text-sm">Cores verdes = retorno médio diário positivo. Retornos diários são pequenos por definição — diferenças de 0,05% entre dias ainda são relevantes quando consistentes por 2+ anos. Evite concluir muito em meses com poucas amostras.</div>
    </div>
  `;
}

function panelLevels(t){
  const bars=data[t].bars;
  const lvl=levels(bars);
  const fib=fibLevels(bars,60);
  const last=lvl.last;
  const ladder = [
    {l:"Topo 60d",v:fib.high,d:(fib.high/last-1)*100},
    {l:"Fib 78.6%",v:fib.l786,d:(fib.l786/last-1)*100},
    {l:"Fib 61.8%",v:fib.l618,d:(fib.l618/last-1)*100},
    {l:"Fib 50.0%",v:fib.l500,d:(fib.l500/last-1)*100},
    {l:"Fib 38.2%",v:fib.l382,d:(fib.l382/last-1)*100},
    {l:"Fib 23.6%",v:fib.l236,d:(fib.l236/last-1)*100},
    {l:"Fundo 60d",v:fib.low,d:(fib.low/last-1)*100}
  ].sort((a,b)=>b.v-a.v);
  document.getElementById("panels").innerHTML=`
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
      <div class="card p-4">
        <div class="font-semibold mb-3">Extremos</div>
        <div class="space-y-2 text-sm">
          <div class="flex justify-between"><span class="dim">Topo histórico</span><span class="num">R$ ${fmt(lvl.ath)} <span class="dim text-xs">(${lvl.dsath}d · ${pct(lvl.pctFromAth)})</span></span></div>
          <div class="flex justify-between"><span class="dim">Máx 52 semanas</span><span class="num">R$ ${fmt(lvl.hi52)} <span class="dim text-xs">(${lvl.dsh}d · ${pct(lvl.pctFromHi)})</span></span></div>
          <div class="flex justify-between"><span class="dim">Preço atual</span><span class="num font-bold">R$ ${fmt(lvl.last)}</span></div>
          <div class="flex justify-between"><span class="dim">Mín 52 semanas</span><span class="num">R$ ${fmt(lvl.lo52)} <span class="dim text-xs">(${lvl.dsl}d · ${pct(lvl.pctFromLo)})</span></span></div>
          <div class="flex justify-between"><span class="dim">Fundo histórico</span><span class="num">R$ ${fmt(lvl.atl)}</span></div>
        </div>
      </div>
      <div class="card p-4">
        <div class="font-semibold mb-3">Fibonacci — swing 60 dias</div>
        <div class="space-y-1">
          ${ladder.map(r=>{
            const isLast = Math.abs(r.v-last)<0.001;
            const aboveLast = r.v>=last;
            return `<div class="flex justify-between items-center py-1.5 ${isLast?"bg-up":""}" style="padding-left:${isLast?8:0}px">
              <span class="text-sm ${aboveLast?"dim":""}">${r.l}</span>
              <span class="num text-sm">R$ ${fmt(r.v)}</span>
              <span class="num text-sm ${cls(r.d)}">${pct(r.d)}</span>
            </div>`;
          }).join("")}
        </div>
      </div>
    </div>
  `;
}

function panelWatch(){
  const rows = state.tickers.map(t=>{
    const d=data[t]; if(!d||!d.quote) return `<tr><td>${t}</td><td colspan="12" class="dim">—</td></tr>`;
    const q=d.quote; const bars=d.bars; const closes=bars.map(b=>b.close);
    const streak=currentStreak(bars);
    const r14=rsi(closes,14);
    const hv=histVol(closes,60);
    const lvl=levels(bars);
    return `<tr class="${t===state.selected?"bg-up":""}" data-t="${t}" style="cursor:pointer">
      <td class="font-semibold">${t}</td>
      <td class="num">${fmt(q.regularMarketPrice)}</td>
      <td class="num ${cls(q.regularMarketChangePercent)}">${pct(q.regularMarketChangePercent)}</td>
      <td class="num ${cls(q.regularMarketChange)}">${fmt(q.regularMarketChange)}</td>
      <td class="num">${fmt(q.regularMarketOpen)}</td>
      <td class="num">${fmt(q.regularMarketDayLow)}</td>
      <td class="num">${fmt(q.regularMarketDayHigh)}</td>
      <td class="num ${streak.dir>0?"up":"down"}">${streak.dir>0?"↑":"↓"} ${streak.len}</td>
      <td class="num">${r14?r14.toFixed(0):"—"}</td>
      <td class="num">${hv?(hv*100).toFixed(0)+"%":"—"}</td>
      <td class="num ${cls(lvl.pctFromHi)}">${pct(lvl.pctFromHi,1)}</td>
      <td class="num ${cls(lvl.pctFromLo)}">${pct(lvl.pctFromLo,1)}</td>
      <td class="dim">${q.regularMarketVolume?Number(q.regularMarketVolume).toLocaleString("pt-BR"):"—"}</td>
    </tr>`;
  }).join("");
  document.getElementById("panels").innerHTML=`
    <div class="card p-0 overflow-hidden">
      <div class="overflow-auto">
      <table class="w-full">
        <thead><tr>
          <th>Ticker</th><th>Preço</th><th>Var%</th><th>Var R$</th><th>Abr</th><th>Mín</th><th>Máx</th>
          <th>Seq.</th><th>RSI</th><th>σ 60d</th><th>vs Máx 52s</th><th>vs Mín 52s</th><th>Volume</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      </div>
    </div>
  `;
  document.querySelectorAll("#panels tr[data-t]").forEach(tr=>tr.onclick=()=>{
    state.selected=tr.dataset.t; save(); renderTickerList(); renderMain();
  });
}

function renderMain(){
  renderHeader(state.selected);
  renderKPIs(state.selected);
  renderPanels();
}

async function refreshAll(){
  document.getElementById("lastUpdate").textContent="Atualizando…";
  document.getElementById("lastUpdate").className="text-xs dim mt-2 pulse";
  await Promise.all(state.tickers.map(async t=>{
    try{
      const q=await fetchQuote(t);
      if(!q) throw new Error("sem dados");
      data[t]={quote:q,bars:(q.historicalDataPrice||[]).filter(b=>b.close)};
    }catch(e){data[t]={quote:null,bars:[],error:e.message}}
  }));
  document.getElementById("lastUpdate").textContent="Atualizado "+new Date().toLocaleTimeString("pt-BR");
  document.getElementById("lastUpdate").className="text-xs dim mt-2";
  renderTickerList();
  if(!state.tickers.includes(state.selected)) state.selected = state.tickers[0];
  renderMain();
}

// events
document.getElementById("btnAdd").onclick=()=>{
  const v=document.getElementById("newTicker").value.trim().toUpperCase();
  if(!v||state.tickers.includes(v)) return;
  state.tickers.push(v); save();
  document.getElementById("newTicker").value="";
  refreshAll();
};
document.getElementById("btnDefault").onclick=()=>{state.tickers=[...DEFAULT_TICKERS];save();refreshAll()};
document.getElementById("btnRefresh").onclick=refreshAll;
document.getElementById("brapiToken").onchange=e=>{state.token=e.target.value;save()};
document.getElementById("brapiToken").value=state.token||"";
document.getElementById("autoRefresh").onchange=e=>{
  if(timer){clearInterval(timer);timer=null}
  if(e.target.checked) timer=setInterval(refreshAll,30000);
};
document.getElementById("newTicker").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("btnAdd").click()});
tabs();
refreshAll();
</script>
</body>
</html>
